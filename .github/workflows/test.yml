name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: go vet + build + test
        run: make test-backend

  ai-poller:
    name: ai-poller (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ai-poller/requirements.txt

      - name: Run unittest discover
        run: make test-poller

  claude-proxy:
    name: claude-proxy (Python / uv)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: claude-proxy/uv.lock

      - name: Run unittest discover
        run: make test-proxy

  web:
    name: Web (Vite + React)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Lint + build
        run: make test-web

  mobile:
    name: Mobile (Expo / TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: tsc --noEmit
        run: make test-mobile

  app:
    name: Android (Gradle unit tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write local.properties
        # The Android module reads these at configure time. Mock values are
        # sufficient for unit tests since they don't hit the network.
        run: |
          echo "GOOGLE_CLIENT_ID=test-client-id" > local.properties
          echo "API_BASE_URL=http://localhost:8080" >> local.properties

      - name: Run unit tests
        run: make test-app

  cli:
    name: CLI (wp, Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install + unit tests
        run: make test-cli

  integration:
    name: Integration (e2e stack)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Bring up the isolated test stack
        run: docker compose -f docker-compose.test.yml up --build -d --wait

      - name: Run integration tests
        run: make test-integration

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
