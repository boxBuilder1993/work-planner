name: Build & Release

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git rev-list version counting

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode release keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/workplanner-release.jks

      - name: Write local.properties
        run: |
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" > local.properties
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        env:
          RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/workplanner-release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --parallel

      - name: Get version info
        id: version
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          VERSION_NAME="1.0.${VERSION_CODE}"
          echo "code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION_NAME} (${VERSION_CODE})"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: workplanner-v${{ steps.version.outputs.name }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Job summary
        run: |
          echo "## 📱 WorkPlanner v${{ steps.version.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Download**: [Latest Release](https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.name }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version code: \`${{ steps.version.outputs.code }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}
          name: WorkPlanner v${{ steps.version.outputs.name }}
          body: |
            Auto-built from commit ${{ github.sha }}

            **Version**: ${{ steps.version.outputs.name }} (code: ${{ steps.version.outputs.code }})

            Download the APK below and install on your Android device.
          files: app/build/outputs/apk/release/app-release.apk
          make_latest: true
